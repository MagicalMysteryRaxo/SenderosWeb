<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact us</title>
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/content-pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link
      rel="shortcut icon"
      href="images/favicon-logo/favicon.ico"
      type="image/x-icon"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <main class="page-content content">
      <div id="navbar-container"></div>
      <section>
        <h2 style="padding: 40px 0 0; justify-content: center">
          We want to hear from you
        </h2>

        <p style="padding: 0; justify-self: center">Send us a quick message</p>
        <div
          id="form-alert"
          style="
            display: none;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            border-radius: 5px;
            font-weight: bold;
          "
        ></div>

        <form action="api/contact.php" method="POST" class="contact-form">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" required />

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="6" required></textarea>

          <button type="submit">Send Message</button>
        </form>
      </section>
    </main>
    <footer>
      <section class="footer-bottom"></section>
    </footer>
    <script src="js/menu-script.js"></script>
    <script src="js/analytics.js"></script>

    <!--  Send email success message  -->
    <script>
      // Check the URL for parameters when the page loads
      const urlParams = new URLSearchParams(window.location.search);
      const status = urlParams.get("status");
      const alertBox = document.getElementById("form-alert");

      if (status === "success") {
        alertBox.textContent = "Message sent successfully!";
        alertBox.style.backgroundColor = "#155724"; // Light green
        alertBox.style.color = "#fff"; // Dark green
        alertBox.style.display = "block";

        // Hide the message after 5000 milliseconds (5 seconds)
        setTimeout(() => {
          alertBox.style.display = "none";
        }, 4000);
      } else if (status === "error") {
        alertBox.textContent = "Sorry, something went wrong. Please try again.";
        alertBox.style.backgroundColor = "#f8d7da"; // Light red
        alertBox.style.color = "#721c24"; // Dark red
        alertBox.style.display = "block";

        // Note: We usually leave error messages on screen so the user
        // has time to read them and figure out what to do next!
      }
    </script>
  </body>
</html>
